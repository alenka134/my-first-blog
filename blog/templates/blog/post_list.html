<!DOCTYPE html>
<html>
<head>
    <title>My blog</title>
</head>
<body>
    <h1>My Blog</h1>

    {% for post in posts %}
        <div>
            <p>published: {{ post.published_date|date:"d M Y H:i" }}</p>
            <h2>{{ post.title }}</h2>
            <p>{{ post.text }}</p>
            <p>author: {{ post.author }}</p>
        </div>
    {% endfor %}

</body>
</html>
