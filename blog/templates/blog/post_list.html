<!DOCTYPE html>
<html>
<head>
    <title>My blog</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <h1 class="my-4">My Blog</h1>

        {% for post in posts %}
            <div class="card mb-3">
                <div class="card-body">
                    <p class="text-muted">
                        published: {{ post.published_date|date:"d M Y H:i" }}
                    </p>

                    <h2 class="card-title">{{ post.title }}</h2>

                    <p class="card-text">{{ post.text }}</p>

                    <p class="text-secondary">
                        author: {{ post.author }}
                    </p>
                </div>
            </div>
        {% endfor %}
    </div>
</body>
</html>
