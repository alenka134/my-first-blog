{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My blog</title>

    <!-- Google Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext">

    <!-- Bootstrap (keep it) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>

<body>
    <header class="page-header">
        <div class="container">
            <div class="page-header-inner">
                <div class="page-header-left">
                    <h1><a href="/">Elena’s Tech Journey in NL</a></h1>
                </div>

                <div class="page-header-right">
                    <div class="profile-photo-wrap" aria-hidden="true">
                        <img class="profile-photo" src="{% static 'img/dolchi.png' %}" alt="My photo">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col">

                {% for post in posts %}
                    <article class="post">
                        <time class="date">
                            {{ post.published_date }}
                        </time>
                        <p class="post-author">By Elena Ovcharenko</p>

                        <h2><a href="">{{ post.title }}</a></h2>

                        <p>{{ post.text|linebreaksbr }}</p>
                    </article>
                {% endfor %}

            </div>
        </div>
    </main>

    <footer class="site-footer">
    <div class="container">
        <div class="site-footer-links">

            <!-- LinkedIn -->
            <a class="footer-link footer-link-linkedin"
               href="https://www.linkedin.com/in/elena-ovcharenko-0650b615/"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="LinkedIn">
                <svg class="footer-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/>
                </svg>
                <span class="footer-link-text">LinkedIn</span>
            </a>

            <span class="site-footer-sep">•</span>

            <!-- SheCodes (FIXED) -->
            <a class="footer-link footer-link-shecodes"
               href="https://www.shecodes.io/"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="SheCodes">
                <img 
                    src="{% static 'img/shecodes.png' %}" 
                    alt="SheCodes" 
                    class="footer-icon">
                <span class="footer-link-text">SheCodes</span>
            </a>

            <span class="site-footer-sep">•</span>

            <!-- Django Girls -->
            <a class="footer-link footer-link-djangogirls"
               href="https://djangogirls.org/en/"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Django Girls">
                <svg class="footer-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 21s-6.7-4.35-9.33-7A5.5 5.5 0 0112 4.5 5.5 5.5 0 0121.33 14c-2.63 2.65-9.33 7-9.33 7z"/>
                </svg>
                <span class="footer-link-text">Django Girls</span>
            </a>

        </div>
    </div>
</footer>
</body>
</html>
